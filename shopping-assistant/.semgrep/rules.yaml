rules:
  - id: detect-hardcoded-gemini-api-key
    pattern-regex: 'AIzaSy[A-Za-z0-9_\-]*'
    message: "Security violation: Detected a hardcoded Google API key pattern. API keys should be loaded from environment variables or a secure secret manager instead of being hardcoded in code."
    languages:
      - python
    severity: ERROR
